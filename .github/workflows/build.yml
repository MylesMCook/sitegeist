name: Release Extension

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clone mini-lit
        run: git clone --depth 1 https://github.com/badlogic/mini-lit.git ../mini-lit

      - name: Clone pi-mono
        run: git clone --depth 1 https://github.com/badlogic/pi-mono.git ../pi-mono

      - name: Install mini-lit
        run: cd ../mini-lit && npm install && npm run build

      - name: Install pi-mono
        run: cd ../pi-mono && npm install && npm run build

      - name: Install sitegeist
        run: npm install

      - name: Build extension
        run: npm run build

      - name: Create zip
        run: |
          cd dist-chrome
          find . -name "*.map" -type f -delete
          zip -r ../sitegeist.zip .

      - name: Extract version
        id: version
        run: echo "version=$(node -p "require('./dist-chrome/manifest.json').version")" >> "$GITHUB_OUTPUT"

      - name: Extract changelog
        id: changelog
        run: |
          # Extract the section for this version from CHANGELOG.md
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(node -e "
            const fs = require('fs');
            const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
            const re = new RegExp('## \\\\[' + VERSION.replace(/\\./g, '\\\\.') + '\\\\][^\\n]*\\n(.*?)(?=\\n## \\\\[|$)', 's');
            const match = changelog.match(re);
            if (match) process.stdout.write(match[1].trim());
          ")
          # Write to file to preserve newlines
          echo "$NOTES" > /tmp/release-notes.md
          echo "" >> /tmp/release-notes.md
          echo "---" >> /tmp/release-notes.md
          echo "" >> /tmp/release-notes.md
          echo 'Download `sitegeist.zip`, unzip, and load as unpacked extension in Chrome/Edge.' >> /tmp/release-notes.md
          echo "" >> /tmp/release-notes.md
          echo "See [installation instructions](https://sitegeist.ai/install.html) for details." >> /tmp/release-notes.md

      - name: Create release
        run: |
          gh release create ${{ github.ref_name }} sitegeist.zip \
            --title "Sitegeist ${{ steps.version.outputs.version }}" \
            --notes-file /tmp/release-notes.md \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
